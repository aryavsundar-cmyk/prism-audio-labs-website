name: CI

# Runs on every PR into main and on direct pushes to main. Branch protection
# (see repo settings) requires the "verify" check to pass before a PR can merge,
# so no change reaches production without going green here.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A newer push to the same PR/branch cancels the older run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cheapest checks first so obvious failures fail fast.
      - name: Trademark guard
        run: npm run check:trademarks

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
